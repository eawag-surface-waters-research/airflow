version: '3.4'
services:
  cadvisor:
    image: 'google/cadvisor:latest'
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:9090/" ]
      interval: 10s
      timeout: 10s
      retries: 5
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk:/dev/disk/:ro
    ports:
      - '9090:8080'